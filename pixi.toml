[workspace]
name = "digitization-toolkit-backend"
version = "0.1.0"
description = "Backend for digitization toolkit - native camera support"
channels = ["conda-forge"]
platforms = ["linux-aarch64", "linux-64"]

[dependencies]
python = "~=3.11.0"
# Web framework
fastapi = ">=0.116.2"
uvicorn = ">=0.35.0"
python-multipart = ">=0.0.20"
starlette = ">=0.48.0"

# Database
sqlalchemy = ">=2.0.25"
psycopg = ">=3.2.12"
alembic = ">=1.14.0"

# Configuration & validation
pydantic = ">=2.11.9"
pydantic-settings = ">=2.7.0"
python-dotenv = ">=1.1.1"
pyyaml = ">=6.0.2"

# Image processing
pillow = ">=11.0.0"

# Testing
pytest = ">=9.0.2"
bagit = ">=1.9.0,<2"

# Camera support - these require system packages
# Note: picamera2 and rpicam need to be accessed via system packages
# We'll handle this in the tasks

[tasks]
# Development server
dev = "uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"

# Production server
start = "uvicorn app.main:app --host 0.0.0.0 --port 8000"

# Database migrations
db-upgrade = "alembic upgrade head"
db-migrate = { cmd = "alembic revision --autogenerate -m", depends-on = [] }
db-downgrade = "alembic downgrade -1"
db-history = "alembic history"

# Testing
test = "pytest tests/"
test-verbose = "pytest tests/ -v"
test-cameras = "python test/test_cameras.py"

# Setup system camera packages link (Raspberry Pi specific)
setup-camera-link = { cmd = """
python -c \"
import sys
from pathlib import Path
site_packages = Path(sys.prefix) / 'lib' / f'python{sys.version_info.major}.{sys.version_info.minor}' / 'site-packages'
site_packages.mkdir(parents=True, exist_ok=True)
pth_file = site_packages / 'system-packages.pth'
pth_file.write_text('/usr/lib/python3/dist-packages\\n')
print(f'Created {pth_file}')
\"
""" }

[feature.dev.dependencies]
# Development-only dependencies
watchfiles = ">=1.1.0"
httptools = ">=0.6.4"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
